<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--pkll,#fdf2f7);color:#1a1a1a;min-height:100vh}
header{background:linear-gradient(135deg,var(--pk,#d4377a),var(--pk2,#a02358));color:white;padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(160,35,88,.3)}
header h1{font-size:16px;font-weight:600}
header p{font-size:11px;opacity:.85;margin-top:2px}
.tabs{display:flex;background:white;border-bottom:1px solid var(--pkb);position:sticky;top:58px;z-index:99;overflow-x:auto}
.tab{flex:1;min-width:60px;padding:10px 4px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2.5px solid transparent;color:#999;white-space:nowrap}
.tab.active{color:var(--pk,#d4377a);border-bottom-color:var(--pk,#d4377a)}
.dbar{display:flex;align-items:center;gap:8px;padding:5px 14px;background:var(--pk2,#a02358);flex-wrap:wrap}
.dbadge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.dbadge.ok{background:#dcfce7;color:#166534}.dbadge.off{background:#fee2e2;color:#991b1b}.dbadge.sync{background:#fef3c7;color:#92400e}
.dbar-msg{flex:1;font-size:11px;color:rgba(255,255,255,.85)}
.dbar-btn{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:white;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap}
.dbar-btn:hover{background:rgba(255,255,255,.28)}
.content{padding:12px;max-width:800px;margin:0 auto}
.card{background:white;border-radius:10px;border:1px solid var(--pkb);padding:14px;margin-bottom:10px}
.ct{font-size:14px;font-weight:700;color:var(--pk2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--pk2);margin-bottom:3px;letter-spacing:.07em;margin-top:8px}
.lbl:first-child{margin-top:0}
input[type=text],input[type=tel],input[type=number],select,textarea{width:100%;padding:8px 10px;border:1px solid var(--pki);border-radius:6px;font-size:14px;background:var(--pkf);outline:none;font-family:inherit;color:#1a1a1a}
input:focus,select:focus,textarea:focus{border-color:var(--pk);background:white}
input[readonly]{background:#f5f0f3;color:#aaa}
textarea{resize:vertical;min-height:58px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.itable{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:8px}
.itable th{background:var(--pkl);color:var(--pk2);padding:5px 6px;text-align:left;font-size:14px;font-weight:700;white-space:nowrap}
.itable td{padding:3px 4px;border-bottom:1px solid #f5e0ec;vertical-align:middle}
.itable td input{padding:5px 6px;font-size:14px;border-radius:4px}
.bx{background:none;border:none;cursor:pointer;font-size:16px;color:var(--pk);padding:4px 6px}
.btn{padding:10px 16px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.bp{background:var(--pk,#d4377a);color:white}.bs{background:var(--pkb,#f0d0e0);color:var(--pk2,#a02358)}.bd{background:var(--pk2,#a02358);color:white}
.bsm{padding:6px 11px;font-size:14px}.bfw{width:100%;padding:13px;font-size:17px}
.tr-row{display:flex;justify-content:space-between;font-size:15px;padding:3px 0}
.tr-fin{display:flex;justify-content:space-between;font-size:20px;font-weight:600;color:var(--pk2,#a02358);border-top:1.5px solid var(--pk,#d4377a);padding-top:8px;margin-top:5px}
.chbox{border-radius:8px;padding:10px 14px;margin-top:10px}
.chbox.vuelto{background:#f0faf0;border:1px solid #86efac;color:#15803d}
.chbox.falta{background:#fff5f5;border:1px solid #fca5a5;color:#991b1b}
.chbox.pagado{background:#f0faf5;border:1px solid #6ee7b7;color:#065f46}
.chlbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.chamt{font-size:22px;font-weight:700}.chdet{font-size:11px;margin-top:3px;opacity:.8}
.ptog{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f9f9f9;border:1px solid var(--pki);border-radius:8px;cursor:pointer;margin-bottom:10px;user-select:none}
.ptog:hover{background:var(--pkl)}
.ptog input[type=checkbox]{width:17px;height:17px;accent-color:var(--pk);cursor:pointer;flex-shrink:0}
.acw{position:relative}
.acl-box{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid var(--pk);border-top:none;border-radius:0 0 8px 8px;z-index:300;max-height:160px;overflow-y:auto;box-shadow:0 6px 16px rgba(212,55,122,.15)}
.aci{padding:8px 10px;cursor:pointer;border-bottom:1px solid #f5e0ec}
.aci:hover{background:var(--pkl)}
.acin{font-size:15px;font-weight:500}.acis{font-size:13px;color:#999;margin-top:1px}
.otabs{display:flex;align-items:center;gap:6px;padding:8px 12px 0;background:var(--pkll);flex-wrap:wrap}
.otab{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px 8px 0 0;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--pkb,#f0d0e0);border-bottom:none;background:var(--pkl,#fce4ef);color:var(--pk2,#a02358)}
.otab.active{background:white;color:var(--pk,#d4377a)}
.otab-x{font-size:13px;line-height:1;opacity:.6}.otab-x:hover{opacity:1}
.otab-new{padding:6px 12px;border-radius:8px 8px 0 0;font-size:16px;cursor:pointer;border:1px dashed var(--pk,#d4377a);border-bottom:none;color:var(--pk,#d4377a);background:transparent}
.otab-new:hover{background:var(--pkl)}
.li{background:white;border:1px solid var(--pkb);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.li:hover{border-color:var(--pk,#d4377a)}
.lin{font-weight:500;font-size:16px}.lis{font-size:14px;color:#999;margin-top:2px}
.liam{font-weight:600;color:var(--pk2,#a02358);font-size:15px}
.pbadge{display:inline-block;background:#dcfce7;color:#15803d;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px;vertical-align:middle}
.ebadge{display:inline-block;background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:4px;vertical-align:middle}
.sb{width:100%;padding:10px 14px;border:1px solid var(--pki);border-radius:8px;font-size:15px;background:white;outline:none;margin-bottom:12px;font-family:inherit}
.sb:focus{border-color:var(--pk,#d4377a)}
.empty{text-align:center;color:#ccc;padding:40px 0}
.eico{font-size:40px;margin-bottom:8px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.mo{background:white;border-radius:14px;padding:20px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto}
.mo h3{color:var(--pk2);font-size:16px;margin-bottom:12px}
.mo table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px}
.mo table th{background:var(--pkl);padding:5px 8px;font-size:11px;text-align:left}
.mo table td{padding:4px 8px;border-bottom:1px solid #f5e0ec}
.mobt{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

/* CALCULATOR */
.calc-wrap{position:fixed;bottom:80px;right:16px;z-index:400;background:white;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:14px;width:240px;border:2px solid var(--pk)}
.calc-display{background:#f0f0f0;border-radius:8px;padding:8px 12px;text-align:right;margin-bottom:8px}
.calc-expr{font-size:11px;color:#888;min-height:16px}
.calc-val{font-size:22px;font-weight:700;color:#1a1a1a;word-break:break-all}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.calc-btn{padding:10px 4px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;background:#f5f5f5;color:#1a1a1a;transition:opacity .1s}
.calc-btn:hover{opacity:.75}
.calc-btn.op{background:var(--pkb);color:var(--pk2)}
.calc-btn.eq{background:var(--pk);color:white;grid-column:span 2}
.calc-btn.clr{background:#fee2e2;color:#991b1b}
.calc-float{position:fixed;bottom:16px;right:16px;z-index:401;background:var(--pk);color:white;border:none;border-radius:50%;width:48px;height:48px;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center}
/* PRESUPUESTO */
.pres-tab{background:#fff8e1;border:1px solid #f59e0b;border-radius:8px 8px 0 0;color:#92400e}
.pres-tab.active{background:white;color:#92400e;border-bottom-color:white}

/* DELIVERY */
.drow{background:white;border:1px solid var(--pkb);border-radius:10px;padding:12px 14px;margin-bottom:18px;border-left:4px solid #f59e0b}
.drow.entr{border-left-color:#16a34a}.drow.cami{border-left-color:#3b82f6}.drow.canc{border-left-color:#9ca3af;opacity:.7}
.desel{font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;border:none;font-family:inherit;cursor:pointer}
.de-pendiente{background:#fef3c7;color:#92400e}.de-entregado{background:#dcfce7;color:#166534}
.de-en-camino{background:#dbeafe;color:#1d4ed8}.de-cancelado{background:#f3f4f6;color:#6b7280}
.dcrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f5e0ec;font-size:15px}
.dcrow:last-child{border:none}
/* MOTO */
.zrow{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f9fafb;border-radius:8px;margin-bottom:6px;border:1px solid #f0f0f0}
.znombre{flex:1;font-size:16px;font-weight:600}.zqty{font-size:15px;color:#6b7280;min-width:70px;text-align:center}
.zsub{font-size:16px;font-weight:700;color:var(--pk2);min-width:90px;text-align:right}
.totbox{background:var(--pk2);color:#fff;border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.weekcard{border:2px solid var(--pkb);border-radius:10px;padding:12px;margin-bottom:10px;background:#fdf8fb}
.weekcard.paid{border-color:#16a34a;background:#f0fdf4}.weekcard.empty{border-color:#e5e7eb;background:#f9fafb}
.weekhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px}
.daybox{text-align:center;padding:6px 4px;border-radius:6px;background:#f9fafb;border:1px solid #f0f0f0}
.daybox.has{background:#fff;border-color:#d1d5db}.daybox.today{background:#d4377a;border-color:var(--pk)}
.daybox-d{font-size:10px;font-weight:700;color:#9ca3af}.daybox.today .daybox-d{color:rgba(255,255,255,.8)}
.daybox-v{font-size:12px;font-weight:800;color:#d1d5db}.daybox.has .daybox-v{color:#a02358}.daybox.today .daybox-v{color:#fff}
.btn-pago{padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:800;font-family:inherit}
.btn-pago.pend{background:#fef3c7;color:#92400e}.btn-pago.paid{background:#dcfce7;color:#166534}
/* CLIENTES */
.cli-row{padding:10px 12px;border-radius:8px;margin-bottom:4px;border:1px solid var(--pkb);display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.cli-row:nth-child(odd){background:#f9fafb}.cli-info{flex:1;min-width:0}
.cli-name{font-size:16px;font-weight:700}.cli-sub{font-size:14px;color:#555;margin-top:2px}
.cli-notes{font-size:11px;color:#888;margin-top:3px;font-style:italic}
.cli-stats{text-align:right;flex-shrink:0}.cli-count{font-size:14px;font-weight:800;color:var(--pk2)}
.cli-last{font-size:10px;color:#9ca3af}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#a02358;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:400;box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:300px}
.toast.show{opacity:1}
/* PRINT */
#pra{display:none}
@media print{
  body>*:not(#pra){display:none !important}
  #pra{display:block !important}
  @page{size:110mm 170mm;margin:10mm 5mm 5mm 5mm}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
}
.tkt{font-family:Arial,Helvetica,sans-serif;font-size:10pt;line-height:1.4;color:black;padding:2mm 2mm;border:3pt solid magenta;border-radius:2mm}
.tkt-h{font-size:13pt;font-weight:bold;color:#0891b2;text-align:center}
.tkt-s{font-size:9pt;text-align:center;margin-bottom:1mm}
.tkt hr{border:none;border-top:.5pt solid #0891b2;margin:1.5mm 0}
.tkt-i{font-size:10pt;margin-bottom:2mm}
.tkt-i div{margin-bottom:.5mm}
.tkt-dir{color:#0e7490;font-weight:700}
.tkt-numped{font-size:15pt;font-weight:900;color:#a21caf;display:inline-block}
.tkt-nbox{display:inline-block;width:18mm;height:6mm;border:.5pt solid #555;vertical-align:middle;margin-left:3mm}
.tkt table{width:100%;border-collapse:collapse;margin-bottom:2mm}
.tkt table th{border:.5pt solid #0891b2;padding:.6mm 1mm;font-size:8pt;background:#e0f7fa}
.tkt table td{border:.5pt solid #0891b2;padding:.6mm 1mm;font-size:8.5pt}
.tkt table th:nth-child(1),.tkt table td:nth-child(1){width:8%}
.tkt table th:nth-child(3),.tkt table td:nth-child(3){width:19%}
.tkt table th:nth-child(4),.tkt table td:nth-child(4){width:19%}
.tkt-tot{text-align:right;border-top:.5pt solid #0891b2;padding-top:1.5mm;font-size:9pt}
.tkt-T{font-size:12pt;font-weight:bold;color:#0891b2}
.tkt-f{margin-top:2mm;font-size:8.5pt;text-align:center;color:#0891b2}
@media(max-width:500px){.g2{grid-template-columns:1fr}}
</style>

<body>
<div id="pra"></div>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
// ── CONSTANTES ────────────────────────────────
const CLIENT_ID='540015184087-ndan8u6ah0opgsifluqgr0hoqfpjmeb8.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.file';
const FNAME='PrimerosPasos_Data.json';
const DEF_Z=[
  {label:'Zona 1',price:1500},{label:'Zona 2',price:2000},{label:'Zona 3',price:3000},
  {label:'Resto Capital',price:4000},{label:'Provincia',price:6000},{label:'Bonificado',price:0},
  {label:'Zona 1 Bonificada',price:0,motoPrice:1500},{label:'Zona 2 Bonificada',price:0,motoPrice:2000}
];
const MONTHS_N=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_S=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DIAS_W=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

// ── HELPERS ───────────────────────────────────
function cp(x)   { return JSON.parse(JSON.stringify(x)); }
function hoy()   { return new Date().toLocaleDateString('es-AR'); }
function getZZ(d){ const s=d||db; return s?.config?.zones?.length?s.config.zones:cp(DEF_Z); }
function fmt(n)  { return (parseFloat(n)||0).toLocaleString('es-AR'); }
function fmtP(n) { return '$'+(parseFloat(n)||0).toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg,ms){ const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms||2500); }

// Date helpers for moto
function parseArgDate(s){
  if(!s) return new Date();
  const p=s.split('/');
  return p.length===3 ? new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0])) : new Date(s);
}
function getMondayOf(d){ const dt=new Date(d);dt.setHours(0,0,0,0);const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));return dt; }
function dkDate(d){ // date -> YYYY-MM-DD key
  if(typeof d==='string'){ const p=d.split('/');if(p.length===3) return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;return d; }
  return d.toISOString().slice(0,10);
}
function dlabel(d){ return DAYS_S[d.getDay()]+' '+d.getDate()+' '+MONTHS_N[d.getMonth()].slice(0,3)+' '+d.getFullYear(); }

function newFrm(){
  return {id:Date.now(),date:hoy(),orderNum:'',name:'',phone:'',address:'',
    items:[{qty:'',desc:'',price:'',sub:0}],zone:0,paid:false,payment:'',observations:'',
    editing:false,dStatus:'pendiente',dZona:'',dAbona:'',payMethod:'efectivo',transferDone:false,cashLocation:'domicilio',motoNoCobra:false,noEnvio:false,noMoto:false,delivType:'domicilio'};
}

// ── ESTADO ────────────────────────────────────
let db={clients:[],orders:[],budgets:[],trips:[],config:{zones:cp(DEF_Z)},motoPayments:{}};
let tab='order';
let modal=null;
let delDate=new Date(); delDate.setHours(0,0,0,0);
let delSubTab='todos'; // todos | pendiente | proximo | en-camino | entregado
const todayD=new Date(); todayD.setHours(0,0,0,0);
let delQ='';
let cliMode='list';
let cliForm={name:'',phone:'',address:'',notes:''};
let cliQ='';
let selectedCli=null;
let theme=localStorage.getItem('pp_theme')||'pink';

// ── TEMAS ─────────────────────────────────────
const THEMES={
  pink: {pk:'#d4377a',pk2:'#a02358',pkl:'#fce4ef',pkll:'#fdf2f7',pkb:'#f0d0e0',pki:'#e8c8d8',pkf:'#fdf8fb'},
  green:{pk:'#16a34a',pk2:'#166534',pkl:'#dcfce7',pkll:'#f0fdf4',pkb:'#bbf7d0',pki:'#86efac',pkf:'#f0fdf4'},
  cyan: {pk:'#0891b2',pk2:'#0e7490',pkl:'#cffafe',pkll:'#ecfeff',pkb:'#a5f3fc',pki:'#67e8f9',pkf:'#ecfeff'},
};
function applyTheme(t){
  const th=THEMES[t]||THEMES.pink;
  const r=document.documentElement;
  Object.entries(th).forEach(([k,v])=>r.style.setProperty('--'+k,v));
}
function setTheme(t){
  theme=t;
  applyTheme(t);
  localStorage.setItem('pp_theme',t);
  render();
}
applyTheme(theme);
let acOn=false;
let presTab=false;
let presupuesto={items:[{qty:'',desc:'',price:'',sub:0}],clientName:'',clientPhone:'',clientAddress:'',notes:''};
let showCalc=false;
let lastO=null;
let slots=[newFrm()];
let si=0;
function S()    { return slots[si]; }
function sNom(i){ const num=slots[i].orderNum?.trim();const n=slots[i].name.trim();return num?'#'+num:(n?n.split(' ')[0]:'Pedido '+(i+1)); }

// ── DRIVE AUTH ────────────────────────────────
let tok=null,fid=null,dst='off',dmsg='No conectado',tcli=null;

function initDrive(){
  if(!window.google){setTimeout(initDrive,300);return;}

  function onTokenOk(r){
    tok=r.access_token;
    // Save token + expiry + email to localStorage
    const expiry=Date.now()+((r.expires_in||3600)*1000);
    localStorage.setItem('pp_token',JSON.stringify({token:tok,expiry}));
    if(r.email) localStorage.setItem('pp_account',r.email);
    setD('sync','Conectado — cargando datos...');render();
    syncD();
    // Schedule silent refresh 2 min before expiry
    const ms=expiry-Date.now()-120000;
    if(ms>0) setTimeout(silentRefresh,ms);
  }

  tcli=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:async(r)=>{
      if(r.error){
        if(r.error==='interaction_required'||r.error==='login_required'){
          // Try silent refresh with login_hint - will keep retrying every 30s
          setTimeout(silentRefresh, 1000);
        } else if(r.error==='user_cancelled'){
          setD('off','Conectá tu cuenta Google para sincronizar');render();
        } else {
          setD('off','Error: '+r.error);render();
        }
        return;
      }
      onTokenOk(r);
    }
  });

  // Try saved token first (fastest — no popup at all)
  try{
    const saved=JSON.parse(localStorage.getItem('pp_token')||'null');
    if(saved&&saved.token&&saved.expiry>Date.now()+60000){
      tok=saved.token;
      setD('sync','Reconectado — cargando datos...');render();
      syncD();
      // Schedule refresh before expiry
      const ms=saved.expiry-Date.now()-120000;
      if(ms>0) setTimeout(silentRefresh,ms);
      return;
    }
  }catch(e){}

  // No saved token — try silent OAuth
  setTimeout(()=>{ try{tcli.requestAccessToken({prompt:'none'});}catch(e){} },400);
}

function silentRefresh(){
  if(!tcli) return;
  const hint=localStorage.getItem('pp_account')||'';
  try{
    google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,
      prompt:'none',
      login_hint:hint,
      callback:(r)=>{
        if(r.error){
          if(tok){tok=null;setD('off','Sesión vencida — tocá "Reconectar"');render();}
          // Retry silent refresh every 30 seconds while disconnected
          setTimeout(silentRefresh, 30000);
          return;
        }
        const expiry=Date.now()+((r.expires_in||3600)*1000);
        tok=r.access_token;
        localStorage.setItem('pp_token',JSON.stringify({token:tok,expiry}));
        if(r.email) localStorage.setItem('pp_account',r.email);
        setD('sync','Reconectado — cargando...');
        syncD();
        const ms=expiry-Date.now()-120000;
        if(ms>0) setTimeout(silentRefresh,ms);
      }
    }).requestAccessToken();
  }catch(e){ setTimeout(silentRefresh, 30000); }
}

function connectDrive(){
  if(!tcli){
    // tcli may not be ready yet — wait and retry
    setTimeout(connectDrive, 500);
    return;
  }

  localStorage.removeItem('pp_token');

}

// ── DRIVE API ─────────────────────────────────
async function gf(url,opts={}){
  const r=await fetch(url,{...opts,headers:{Authorization:'Bearer '+tok,...(opts.headers||{})}});
  if(r.status===401){
    tok=null;
    localStorage.removeItem('pp_token'); // clear stale token
    setD('off','⚠️ Sesión vencida — tocá "Reconectar"');render();
    throw new Error('Token expirado');
  }
  return r;
}

async function syncD(){
  setD('sync','Sincronizando...');
  try{
    const q=encodeURIComponent(`name='${FNAME}' and trashed=false`);
    const res=await gf(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
    const d=await res.json();
    if(d.files&&d.files.length){
      fid=d.files[0].id;
      const fr=await gf(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`);
      const txt=await fr.text();
      let p;
      try{ p=JSON.parse(txt); }catch(e){ p={}; } // safe parse
      p.clients=p.clients||[];p.orders=p.orders||[];p.config=p.config||{};
      p.config.zones=p.config.zones?.length?p.config.zones:cp(DEF_Z);
      p.motoPayments=p.motoPayments||{};
      p.budgets=p.budgets||[];
      p.trips=p.trips||[];
      db=p;
      setD('ok',`✅ Drive — ${db.orders.length} pedidos`);
    } else {
      db.motoPayments={};
      await drWrite(db);
      setD('ok','Archivo creado en Drive ✓');
    }
    render();
  }catch(e){if(tok){setD('off','Error: '+e.message);render();}}
}

async function drWrite(data){
  const body=JSON.stringify(data,null,2);
  const meta=JSON.stringify({name:FNAME,mimeType:'application/json'});
  const form=new FormData();
  form.append('metadata',new Blob([meta],{type:'application/json'}));
  form.append('media',new Blob([body],{type:'application/json'}));
  if(fid){
    await gf(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=multipart`,{method:'PATCH',body:form});
  } else {
    const r=await gf('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',body:form});
    const j=await r.json();fid=j.id;
  }
}

async function ensureTok(){
  // Check saved token is still valid (>2 min left)
  try{
    const saved=JSON.parse(localStorage.getItem('pp_token')||'null');
    if(saved&&saved.token&&saved.expiry>Date.now()+120000){
      tok=saved.token;return true;
    }
  }catch(e){}
  // Try silent refresh and wait up to 5 seconds
  return new Promise(resolve=>{
    if(!tcli){resolve(false);return;}
    const hint=localStorage.getItem('pp_account')||'';
    try{
      google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID,scope:SCOPES,prompt:'none',login_hint:hint,
        callback:(r)=>{
          if(r.error){tok=null;setD('off','Sesión expirada — reconectá');render();resolve(false);return;}
          const expiry=Date.now()+((r.expires_in||3600)*1000);
          tok=r.access_token;
          localStorage.setItem('pp_token',JSON.stringify({token:tok,expiry}));
          if(r.email) localStorage.setItem('pp_account',r.email);
          setD('ok',`✅ Drive reconectado`);
          const ms=expiry-Date.now()-120000;if(ms>0)setTimeout(silentRefresh,ms);
          resolve(true);
        }
      }).requestAccessToken();
    }catch(e){resolve(false);}
    setTimeout(()=>resolve(false),6000); // timeout fallback
  });
}

async function drMerge(fn){
  let fresh=cp(db);
  if(tok&&fid){
    try{
      const r=await gf(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`);
      fresh=JSON.parse(await r.text());
      fresh.clients=fresh.clients||[];fresh.orders=fresh.orders||[];
      fresh.config=fresh.config||{};fresh.config.zones=db.config.zones;
      fresh.motoPayments=fresh.motoPayments||{};
      fresh.budgets=fresh.budgets||[];
      fresh.trips=fresh.trips||[];
    }catch(e){
      // If token expired during read, try to refresh and re-read
      if(!tok){
        const ok=await ensureTok();
        if(ok&&fid){
          try{
            const r2=await gf(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`);
            fresh=JSON.parse(await r2.text());
            fresh.clients=fresh.clients||[];fresh.orders=fresh.orders||[];
            fresh.config=fresh.config||{};fresh.config.zones=db.config.zones;
            fresh.motoPayments=fresh.motoPayments||{};
            fresh.budgets=fresh.budgets||[];fresh.trips=fresh.trips||[];
          }catch(e2){}
        }
      }
    }
  }
  const merged=fn(fresh);
  // If we lost the token at any point, try to recover before writing
  if(!tok&&fid) await ensureTok();
  if(tok) await drWrite(merged);
  else {
    // Saved locally only — update db in memory and warn
    db=merged;
    setD('off','⚠️ Guardado solo localmente — Drive desconectado');
    render();
    throw new Error('sin_drive');
  }
  return merged;
}

async function saveOP(shouldPrint){
  const isTextOrder = (S().orderNum?.trim()||'')!=='' && isNaN(Number(S().orderNum?.trim()));
  if(!isTextOrder && !S().address.trim()){alert('La dirección es obligatoria.');return;}
  const items=S().items.filter(i=>i.desc.trim());
  if(!isTextOrder && !items.length){alert('Agregá al menos un artículo.');return;}

  // If not connected, try silent refresh first before asking user
  if(!tok){
    setD('sync','Reconectando a Drive...');render();
    const ok=await ensureTok();
    if(!ok&&!confirm('No se pudo conectar a Drive. ¿Guardar solo localmente?')) return;
  }

  const isEdit=!!S().editing;
  setD('sync',isEdit?'Actualizando...':'Guardando...');
  try{
    const sub=items.reduce((s,i)=>s+(parseFloat(i.sub)||0),0);
    const zz=getZZ();const ship=S().noEnvio?0:(zz[S().zone]?.price??0);const tot=sub+ship;
    const pay=S().paid?tot:(parseFloat(S().payment)||0);
    const finalPaid=S().paid||(S().payMethod==='efectivo'&&S().cashLocation==='local')||(S().payMethod==='transferencia'&&S().transferDone);
    const order={
      id:S().id,date:S().date,orderNum:S().orderNum,name:S().name,phone:S().phone,
      address:S().address,observations:S().observations,zone:S().zone,paid:finalPaid,
      payMethod:S().payMethod,transferDone:S().transferDone,cashLocation:S().cashLocation,
      items,shipping:ship,subtotal:sub,total:tot,payment:pay,
      zoneName:zz[S().zone]?.label||'',savedAt:new Date().toISOString(),
      dStatus:S().dStatus||'pendiente',dZona:zz[S().zone]?.label||'',dAbona:S().dAbona||'',
      motoNoCobra:S().motoNoCobra||false,
      noEnvio:S().noEnvio||false,
      noMoto:S().noMoto||false,
      delivType:S().delivType||'domicilio'
    };
    const merged=await drMerge(fresh=>{
      const ci=fresh.clients.findIndex(c=>c.phone===order.phone);
      const cd={name:order.name,phone:order.phone,address:order.address};
      if(ci>=0) fresh.clients[ci]={...fresh.clients[ci],...cd};else if(order.phone||order.name) fresh.clients.push(cd);
      if(isEdit){const oi=fresh.orders.findIndex(x=>x.id===order.id);if(oi>=0)fresh.orders[oi]=order;else fresh.orders.push(order);}
      else fresh.orders.push(order);
      return fresh;
    });
    db=merged;lastO=order;
    setD('ok',`${isEdit?'✅ Actualizado':'✅ Guardado'} — ${db.orders.length} pedidos`);
    if(isEdit){
      // Keep slot open but mark it as no longer editing-dirty
      slots[si].editing=true; // still in edit mode so user can keep changing
      showToast('Pedido actualizado ✓');
    } else {
      slots[si]=newFrm();
    }
    render();
    if(shouldPrint) setTimeout(()=>printO(lastO),80);
  }catch(e){
    if(e.message==='sin_drive'){
      // Already saved locally and warned — just update state
      lastO=db.orders[db.orders.length-1]||lastO;
      slots[si]=newFrm();render();
      if(shouldPrint) setTimeout(()=>printO(lastO),80);
    } else {
      setD('off','Error: '+e.message);render();
    }
  }
}

function cSub()  { return S().items.reduce((s,i)=>s+(parseFloat(i.sub)||0),0); }
function cShip() { if(S().noEnvio) return 0; return getZZ()[S().zone]?.price??0; }
function cTot()  { return cSub()+cShip(); }

function chHTML(){
  const tot=cTot();
  if(S().payMethod==='transferencia'){
    if(S().transferDone) return `<div class="chbox pagado"><div class="chlbl">✅ Transferencia confirmada</div><div class="chamt">$${fmt(tot)}</div><div class="chdet">Pago recibido</div></div>`;
    return '';
  }
  if(S().paid) return `<div class="chbox pagado"><div class="chlbl">✅ Pedido pagado</div><div class="chamt">$${fmt(tot)}</div><div class="chdet">El cliente no lleva vuelto ni debe nada</div></div>`;
  if(!S().payment) return '';
  const pay=parseFloat(S().payment)||0,ch=pay-tot;
  if(ch>=0) return `<div class="chbox vuelto"><div class="chlbl">💚 Vuelto a entregar</div><div class="chamt">$${fmt(ch)}</div><div class="chdet">El cliente entrega $${fmt(pay)} · Total $${fmt(tot)}</div></div>`;
  return `<div class="chbox falta"><div class="chlbl">🔴 Falta cobrar</div><div class="chamt">$${fmt(Math.abs(ch))}</div><div class="chdet">El cliente entrega $${fmt(pay)} · Total $${fmt(tot)}</div></div>`;
}

function acSearch(q){
  if(!q||q.length<2) return [];
  const lq=q.toLowerCase();
  return db.clients.filter(c=>c.name?.toLowerCase().includes(lq)||c.phone?.includes(lq)).slice(0,5);
}
function acFill(n,p,a){S().name=n;S().phone=p;S().address=a;acOn=false;render();}
function acRef(){
  const el=document.getElementById('acl');if(!el)return;

  if(!s.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="acl-box">${s.map(c=>`
    <div class="aci" onmousedown="acFill(${JSON.stringify(c.name)},${JSON.stringify(c.phone)},${JSON.stringify(c.address||'')})">

      <div class="acis">${c.phone}${c.address?' · '+c.address:''}</div>
    </div>`).join('')}</div>`;
}

// ── DELIVERY HELPERS ──────────────────────────
function getDelOrders(){
  const dateStr=delDate.toLocaleDateString('es-AR');
  const delKey=dkDate(delDate); // YYYY-MM-DD for reliable comparison
  return db.orders.filter(o=>{
    if(!o.date) return false;
    return dkDate(o.date)===delKey;
  }).sort((a,b)=>{
    const na=parseInt(a.orderNum)||999999,nb=parseInt(b.orderNum)||999999;
    return na===nb?(a.savedAt||'').localeCompare(b.savedAt||''):na-nb;
  });
}
function dPrevDay(){delDate.setDate(delDate.getDate()-1);render();}
function dNextDay(){delDate=new Date(delDate);delDate.setDate(delDate.getDate()+1);render();}
function dGoToday(){delDate=new Date();delDate.setHours(0,0,0,0);render();}

function motoZonePrice(zoneName){
  const zz=getZZ();
  const z=zz.find(z=>z.label===zoneName);
  if(!z) return 0;
  // motoPrice overrides price for bonified zones (customer pays $0, moto gets paid)
  return z.motoPrice!=null ? z.motoPrice : z.price;
}

function filterHist(q){
  const rows=document.querySelectorAll('.hist-row');
  const term=(q||'').toLowerCase().trim();
  rows.forEach(r=>{
    r.style.display=(!term||r.dataset.search.includes(term))?'':'none';
  });
}

async function onDelStatus(id,val){
  const o=db.orders.find(x=>x.id===id);
  if(!o) return;
  o.dStatus=val;
  // Don't call render() here — it shifts the DOM while the select is still firing
  // Just update the visual border color of this card in-place
  const card=document.querySelector(`[data-oid="${id}"]`);
  if(card){
    const isEntr=val==='entregado'||val==='retirado'||val==='retiro-moto';
    const isCami=val==='en-camino'||val==='retira-cliente'||val==='proximo';
    const isCanc=val==='cancelado';
    card.className='drow '+(isEntr?'entr':isCami?'cami':isCanc?'canc':'');
    card.style.padding='14px 16px';
  }
  await updateDelivery(id,{dStatus:val});
  setD('ok',`✅ Drive — ${db.orders.length} pedidos`);
  // Now safe to re-render (Drive save is done, no pending DOM events)
  render();
}
async function onDelZona(id,val){
  db.orders.find(o=>o.id===id)&&(db.orders.find(o=>o.id===id).dZona=val);
  await updateDelivery(id,{dZona:val});
  setD('ok',`✅ Drive — ${db.orders.length} pedidos`);
}
async function onDelAbona(id,val){
  const v=val.trim().toLowerCase()==='pago'?'pago':(parseFloat(val)||0);
  db.orders.find(o=>o.id===id)&&(db.orders.find(o=>o.id===id).dAbona=v);
  await updateDelivery(id,{dAbona:v});
  setD('ok',`✅ Drive — ${db.orders.length} pedidos`);
}

// Updates trae/total/vuelto display in real time WITHOUT re-rendering the page
function updateDeliveryAmts(input){
  const id = parseInt(input.dataset.oid);
  const total = parseFloat(input.dataset.total)||0;
  const val = input.value.trim();
  const pagado = val.toLowerCase()==='pago';
  const abonaNum = pagado ? total : (parseFloat(val)||0);
  const vuelto = (!pagado && abonaNum>total && total>0) ? abonaNum-total : 0;

// ── MOTO TAB ──────────────────────────────────
function motoHTML(){
  const zz=getZZ();
  const pagos=db.motoPayments||{};
  const dateStr=delDate.toLocaleDateString('es-AR');
  const todayOrders=getDelOrders();

  let totalHoy=0;
  let h=`<div class="card"><div class="ct">📊 Envíos de hoy — ${dateStr}</div>`;
  zz.forEach(z=>{
    const qty=todayOrders.filter(o=>o.dStatus==='entregado'&&(o.dZona||o.zoneName)===z.label).length;
    const sub=qty*(z.price||0);totalHoy+=sub;
    h+=`<div class="zrow"><div class="znombre">${z.label}</div><div class="zqty">${qty} envío/s</div><div class="zsub">$${fmt(sub)}</div></div>`;
  });
  h+=`<div class="totbox"><div style="font-size:12px;opacity:.85">Total a pagar a la moto hoy</div><div style="font-size:24px;font-weight:900">$${fmt(totalHoy)}</div></div></div>`;

  // Semanas del mes
  const yr=delDate.getFullYear(),mo=delDate.getMonth();
  const costByDay={};
  db.orders.forEach(o=>{
    if(!isFlex && !isPickup && o.dStatus!=='cancelado') return;
    if(o.noEnvio) return;
    if(o.noMoto) return;
    const isFlex=(o.orderNum||'').toString().trim().toUpperCase().startsWith('FLEX');
    if(isFlex) return;
    const dt=parseArgDate(o.date);
    if(dt.getFullYear()===yr&&dt.getMonth()===mo){
      const k=dkDate(o.date);
      costByDay[k]=(costByDay[k]||0)+motoZonePrice(o.dZona||o.zoneName||'');
    }
  });

  const weekMap={};
  Object.entries(costByDay).forEach(([key,cost])=>{
    const dt=new Date(key+'T00:00:00');
    const monday=getMondayOf(dt);
    const wk='wk_'+monday.toISOString().slice(0,10);
    if(!weekMap[wk]) weekMap[wk]={monday,days:{},total:0};
    weekMap[wk].days[key]=cost;weekMap[wk].total+=cost;
  });
  const thisMonday=getMondayOf(delDate),thisWk='wk_'+thisMonday.toISOString().slice(0,10);
  if(!weekMap[thisWk]) weekMap[thisWk]={monday:thisMonday,days:{},total:0};
  const sortedWeeks=Object.entries(weekMap).sort((a,b)=>a[0].localeCompare(b[0]));

  if(sortedWeeks.length){
    h+=`<div class="card"><div class="ct">📅 Semanas de ${MONTHS_N[mo]} ${yr}</div>`;
    sortedWeeks.forEach(([wk,wd])=>{
      const monday=wd.monday,sunday=new Date(monday);sunday.setDate(sunday.getDate()+6);
      const paid=!!pagos[wk],empty=wd.total===0;
      const wkLabel=monday.getDate()+' '+MONTHS_N[monday.getMonth()].slice(0,3)+' → '+sunday.getDate()+' '+MONTHS_N[sunday.getMonth()].slice(0,3);
      h+=`<div class="weekcard ${paid?'paid':empty?'empty':''}">
        <div class="weekhdr">
          <div><div style="font-size:11px;font-weight:800;color:#6b7280">SEMANA</div><div style="font-size:13px;font-weight:700">${wkLabel}</div></div>
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:900;color:${paid?'#16a34a':'var(--pk2)'}">$${fmt(wd.total)}</div>
            ${!empty?`<button class="btn-pago ${paid?'paid':'pend'}" onclick="toggleMotoPago('${wk}').then(()=>render())">${paid?'✅ Pagado':'⏳ Marcar como pagado'}</button>`:'<div style="font-size:11px;color:#9ca3af">Sin envíos</div>'}
          </div>
        </div>
        <div class="weekdays">`;
      for(let i=0;i<7;i++){
        const dt=new Date(monday);dt.setDate(monday.getDate()+i);
        const key=dt.toISOString().slice(0,10),cost=wd.days[key]||0;
        const isTod=dt.toLocaleDateString('es-AR')===hoy(),hasData=cost>0;
        let cls='daybox';if(isTod)cls+=' today';else if(hasData)cls+=' has';
        h+=`<div class="${cls}"><div class="daybox-d">${DIAS_W[i]}</div><div class="daybox-v">${cost>0?'$'+fmt(cost):'-'}</div></div>`;
      }
      h+='</div></div>';
    });
    h+='</div>';
  }

  const totMes=Object.values(costByDay).reduce((s,v)=>s+v,0);
  const totPagado=sortedWeeks.filter(([wk])=>pagos[wk]).reduce((s,[,w])=>s+w.total,0);
  h+=`<div class="card"><div class="ct">💰 Resumen mensual — ${MONTHS_N[mo]} ${yr}</div>
    <div class="dcrow" style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f5e0ec;font-size:13px"><span style="font-weight:600">Total del mes</span><span style="font-weight:800;color:var(--pk2)">$${fmt(totMes)}</span></div>
    <div class="dcrow" style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f5e0ec;font-size:13px"><span style="color:#16a34a;font-weight:600">✅ Pagado</span><span style="font-weight:800;color:#16a34a">$${fmt(totPagado)}</span></div>
    <div class="dcrow" style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px"><span style="color:#f59e0b;font-weight:600">⏳ Pendiente</span><span style="font-weight:800;color:#f59e0b">$${fmt(totMes-totPagado)}</span></div>
  </div>`;
  return h;
}

function exportClientes(){
  const rows=[['Nombre','Telefono','Direccion','Notas','Pedidos']];
  db.clients.forEach(c=>{
    const cnt=db.orders.filter(o=>o.phone===c.phone&&c.phone).length;
    rows.push([c.name||'',c.phone||'',c.address||'',c.notes||'',cnt]);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='clientes.csv';a.click();URL.revokeObjectURL(a.href);
}

// ── CALCULADORA ───────────────────────────────
let calcExpr='',calcVal='0';
function calcHTML(){
  return `
  <button class="calc-float" onclick="showCalc=!showCalc;render()" title="Calculadora">🧮</button>
  ${showCalc?`<div class="calc-wrap" id="calc-wrap" tabindex="-1">
    <div class="calc-display">
      <div class="calc-expr" id="calc-expr">${calcExpr||'\u00a0'}</div>
      <div class="calc-val" id="calc-val">${calcVal}</div>
    </div>
    <div class="calc-grid">
      <button class="calc-btn clr" onclick="calcClr()">C</button>
      <button class="calc-btn op" onclick="calcDel()">⌫</button>
      <button class="calc-btn op" onclick="calcPercent()">%</button>
      <button class="calc-btn op" onclick="calcOp('/')">÷</button>
      <button class="calc-btn" onclick="calcNum('7')">7</button>
      <button class="calc-btn" onclick="calcNum('8')">8</button>
      <button class="calc-btn" onclick="calcNum('9')">9</button>
      <button class="calc-btn op" onclick="calcOp('*')">×</button>
      <button class="calc-btn" onclick="calcNum('4')">4</button>
      <button class="calc-btn" onclick="calcNum('5')">5</button>
      <button class="calc-btn" onclick="calcNum('6')">6</button>
      <button class="calc-btn op" onclick="calcOp('-')">−</button>
      <button class="calc-btn" onclick="calcNum('1')">1</button>
      <button class="calc-btn" onclick="calcNum('2')">2</button>
      <button class="calc-btn" onclick="calcNum('3')">3</button>
      <button class="calc-btn op" onclick="calcOp('+')">+</button>
      <button class="calc-btn" onclick="calcNum('0')" style="grid-column:span 2">0</button>
      <button class="calc-btn" onclick="calcNum('.')">.</button>
      <button class="calc-btn eq" onclick="calcEq()">=</button>
    </div>
  </div>`:''}`;
}
function calcNum(n){
  if(calcVal==='0'&&n!=='.')calcVal=n;else calcVal+=n;
  calcRender();
}
function calcOp(op){
  calcExpr+=(calcVal||'0')+op;calcVal='0';calcRender();
}
function calcDel(){
  if(calcVal.length>1)calcVal=calcVal.slice(0,-1);else calcVal='0';calcRender();
}
function calcPercent(){
  calcVal=String(Math.round((parseFloat(calcVal||0)/100)*10000)/10000);calcRender();
}
function calcEq(){
  try{
    const expr=calcExpr+(calcVal||'0');
    const res=Function('"use strict";return ('+expr+')')();
    calcVal=String(Math.round(res*100)/100);calcExpr='';
  }catch(e){calcVal='Error';calcExpr='';}
  calcRender();
}
function calcClr(){calcExpr='';calcVal='0';calcRender();}
function calcRender(){
  const ve=document.getElementById('calc-val');
  const ee=document.getElementById('calc-expr');
  if(ve)ve.textContent=calcVal;
  if(ee)ee.textContent=calcExpr||'\u00a0';
}
document.addEventListener('keydown',function(e){
  if(!showCalc) return;
  const tag=(document.activeElement||{}).tagName;
  const calcWrap=document.getElementById('calc-wrap');
  const inCalc=calcWrap&&calcWrap.contains(document.activeElement);
  // If focus is in a form field that's NOT inside the calc, let it type normally
  if((tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')&&!inCalc) return;
  if(e.key>='0'&&e.key<='9'){e.preventDefault();calcNum(e.key);}
  else if(e.key==='.'){e.preventDefault();calcNum('.');}
  else if(e.key==='+'||e.key==='-'||e.key==='*'){e.preventDefault();calcOp(e.key);}
  else if(e.key==='/'){e.preventDefault();calcOp('/');}
  else if(e.key==='Enter'||e.key==='='){e.preventDefault();calcEq();}
  else if(e.key==='Backspace'){e.preventDefault();calcDel();}
  else if(e.key==='Escape'){e.preventDefault();showCalc=false;render();}
  else if(e.key==='c'||e.key==='C'){e.preventDefault();calcClr();}
  else if(e.key==='%'){e.preventDefault();calcPercent();}
});

async function savePresupuesto(){
  const items=presupuesto.items.filter(i=>i.desc.trim());
  if(!items.length){alert('Agregá al menos un artículo.');return;}
  const total=presSubTotal();
  const budget={
    id:Date.now(),date:hoy(),
    clientName:presupuesto.clientName,clientPhone:presupuesto.clientPhone,
    clientAddress:presupuesto.clientAddress,notes:presupuesto.notes,
    items,total,savedAt:new Date().toISOString()
  };
  setD('sync','Guardando presupuesto...');
  try{
    const m=await drMerge(f=>{
      f.budgets=f.budgets||[];
      f.budgets.push(budget);
      // Also save client if phone/name given
      if(budget.clientPhone||budget.clientName){
        const ci=f.clients.findIndex(c=>c.phone===budget.clientPhone&&budget.clientPhone);
        const cd={name:budget.clientName,phone:budget.clientPhone,address:budget.clientAddress};
        if(ci>=0) f.clients[ci]={...f.clients[ci],...cd};else f.clients.push(cd);
      }
      return f;
    });
    db=m;
    setD('ok',`✅ Presupuesto guardado — ${db.budgets.length} presupuesto(s)`);
    showToast('Presupuesto guardado ✓');
    presupuesto={items:[{qty:'',desc:'',price:'',sub:0}],clientName:'',clientPhone:'',clientAddress:'',notes:''};
    render();
  }catch(e){setD('off','Error: '+e.message);render();}
}

  const b=db.budgets.find(x=>x.id===id);if(!b)return;
  presupuesto={
    items:b.items.map(i=>({...i})),
    clientName:b.clientName||'',clientPhone:b.clientPhone||'',
    clientAddress:b.clientAddress||'',notes:b.notes||''
  };
  render();
}

async function deleteBudget(id){
  if(!confirm('¿Eliminar este presupuesto?'))return;
  const m=await drMerge(f=>{f.budgets=(f.budgets||[]).filter(x=>x.id!==id);return f;});
  db=m;render();showToast('Presupuesto eliminado');
}

function presToOrder(){
  const items=presupuesto.items.filter(i=>i.desc.trim());
  if(!items.length){alert('Agregá al menos un artículo al presupuesto.');return;}
  if(slots.length>=4){alert('Máximo 4 pedidos simultáneos. Cerrá uno primero.');return;}
  const nf=newFrm();
  nf.name=presupuesto.clientName;
  nf.phone=presupuesto.clientPhone;
  nf.address=presupuesto.clientAddress;
  nf.observations=presupuesto.notes;
  nf.items=items.map(i=>({...i}));
  slots.push(nf);si=slots.length-1;presTab=false;
  showToast('Presupuesto convertido a pedido ✓');
  render();
}

function budgetToOrder(id){
  const b=db.budgets.find(x=>x.id===id);if(!b)return;
  if(slots.length>=4){alert('Máximo 4 pedidos simultáneos.');return;}
  const nf=newFrm();
  nf.name=b.clientName||'';nf.phone=b.clientPhone||'';
  nf.address=b.clientAddress||'';nf.observations=b.notes||'';
  nf.items=b.items.map(i=>({...i}));
  slots.push(nf);si=slots.length-1;presTab=false;
  showToast('Presupuesto convertido a pedido ✓');
  render();
}

  const t=setInterval(()=>{if(window.google&&window.google.accounts){clearInterval(t);initDrive();}},200);
  // Periodic token health check every 5 min
  setInterval(async()=>{
    if(!tok) return;
    const saved=JSON.parse(localStorage.getItem('pp_token')||'null');
    if(!saved||saved.expiry<Date.now()+300000){
      await ensureTok();
    }
  },5*60*1000);
});
